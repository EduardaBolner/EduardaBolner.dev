<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Interestelar em 2D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px;
    height: 600px;
    overflow: hidden;
    background: #000;
    font-family: 'Exo 2', sans-serif;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .badge {
    position: absolute;
    top: 24px; right: 24px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 5px 12px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
  }

  .title-block {
    position: absolute;
    bottom: 60px;
    left: 48px;
    right: 48px;
  }

  .eyebrow {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: #7df9ff;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeUp 0.6s 0.3s forwards;
  }

  .title {
    font-family: 'Orbitron', monospace;
    font-size: 42px;
    font-weight: 900;
    line-height: 1.05;
    color: #fff;
    text-shadow: 0 0 40px rgba(125,249,255,0.5), 0 0 80px rgba(125,249,255,0.2);
    opacity: 0;
    animation: fadeUp 0.7s 0.5s forwards;
  }

  .title em {
    font-style: normal;
    color: #7df9ff;
  }

  .desc {
    font-size: 14px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
    margin-top: 12px;
    max-width: 500px;
    font-style: italic;
    opacity: 0;
    animation: fadeUp 0.7s 0.7s forwards;
  }

  .tag {
    display: inline-block;
    margin-top: 16px;
    background: rgba(125,249,255,0.12);
    border: 1px solid rgba(125,249,255,0.4);
    border-radius: 100px;
    padding: 4px 14px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: #7df9ff;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeUp 0.7s 0.9s forwards;
  }

  .scanline {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  .vignette {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,10,0.85) 100%);
    pointer-events: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<canvas id="bg" width="800" height="600"></canvas>

<div class="overlay">
  <div class="badge">PYGAME</div>
  <div class="title-block">
    <div class="eyebrow">Campo Estelar Infinito</div>
    <div class="title">JOGO<br><em>INTERESTELAR</em><br>EM 2D</div>
    <div class="desc">Controle uma nave interestelar, desvie de asteroides e enfrente inimigos em um campo estelar sem fim.</div>
    <span class="tag">Python</span>
  </div>
  <div class="scanline"></div>
  <div class="vignette"></div>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// Stars
const stars = Array.from({length: 220}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.8 + 0.2,
  speed: Math.random() * 0.4 + 0.05,
  alpha: Math.random() * 0.6 + 0.3,
  twinkle: Math.random() * Math.PI * 2
}));

// Asteroids
const asteroids = Array.from({length: 7}, (_, i) => ({
  x: 120 + i * 95 + Math.random() * 40,
  y: 60 + Math.random() * 320,
  r: 12 + Math.random() * 22,
  rot: Math.random() * Math.PI * 2,
  rotSpeed: (Math.random() - 0.5) * 0.012,
  vx: -(0.3 + Math.random() * 0.5),
  color: `hsl(${20 + Math.random()*30}, ${10+Math.random()*15}%, ${22+Math.random()*18}%)`
}));

// Ship
const ship = {
  x: 160, y: 300,
  floatY: 0,
  floatSpeed: 0.018,
  trail: []
};

// Particles / engine
const particles = [];

function spawnParticle() {
  const spread = (Math.random() - 0.5) * 12;
  particles.push({
    x: ship.x - 38,
    y: ship.y + ship.floatY + spread,
    vx: -(1.5 + Math.random() * 2.5),
    vy: (Math.random() - 0.5) * 0.6,
    life: 1,
    size: 2 + Math.random() * 3
  });
}

function drawAsteroid(ast) {
  ctx.save();
  ctx.translate(ast.x, ast.y);
  ctx.rotate(ast.rot);
  const pts = 9;
  ctx.beginPath();
  for (let i = 0; i < pts; i++) {
    const a = (i / pts) * Math.PI * 2;
    const rr = ast.r * (0.75 + Math.random() * 0.0 + (i % 3 === 0 ? -0.15 : 0.1));
    const x = Math.cos(a) * rr;
    const y = Math.sin(a) * rr;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = ast.color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // crater
  ctx.beginPath();
  ctx.arc(ast.r * 0.3, -ast.r * 0.2, ast.r * 0.18, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function drawShip(sx, sy) {
  ctx.save();
  ctx.translate(sx, sy);

  // Engine glow
  const grd = ctx.createRadialGradient(-38, 0, 2, -38, 0, 32);
  grd.addColorStop(0, 'rgba(100,200,255,0.55)');
  grd.addColorStop(1, 'rgba(0,80,200,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.ellipse(-38, 0, 32, 18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.beginPath();
  ctx.moveTo(40, 0);
  ctx.lineTo(-10, -18);
  ctx.lineTo(-30, -10);
  ctx.lineTo(-38, 0);
  ctx.lineTo(-30, 10);
  ctx.lineTo(-10, 18);
  ctx.closePath();
  const bodyGrd = ctx.createLinearGradient(-38, -18, 40, 18);
  bodyGrd.addColorStop(0, '#1a2a4a');
  bodyGrd.addColorStop(0.5, '#2a4a7a');
  bodyGrd.addColorStop(1, '#1a2a4a');
  ctx.fillStyle = bodyGrd;
  ctx.fill();
  ctx.strokeStyle = 'rgba(125,249,255,0.35)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Wing
  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(-15, -32);
  ctx.lineTo(-30, -12);
  ctx.lineTo(-10, -8);
  ctx.closePath();
  ctx.fillStyle = '#16304f';
  ctx.fill();
  ctx.strokeStyle = 'rgba(125,249,255,0.2)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(-15, 32);
  ctx.lineTo(-30, 12);
  ctx.lineTo(-10, 8);
  ctx.closePath();
  ctx.fillStyle = '#16304f';
  ctx.fill();
  ctx.strokeStyle = 'rgba(125,249,255,0.2)';
  ctx.stroke();

  // Cockpit
  ctx.beginPath();
  ctx.ellipse(12, -4, 14, 9, -0.2, 0, Math.PI * 2);
  const cockpitGrd = ctx.createRadialGradient(14, -5, 1, 12, -4, 14);
  cockpitGrd.addColorStop(0, 'rgba(180,240,255,0.9)');
  cockpitGrd.addColorStop(0.5, 'rgba(80,180,255,0.5)');
  cockpitGrd.addColorStop(1, 'rgba(0,50,120,0.3)');
  ctx.fillStyle = cockpitGrd;
  ctx.fill();

  // Hull line
  ctx.beginPath();
  ctx.moveTo(-5, -14);
  ctx.lineTo(30, -2);
  ctx.strokeStyle = 'rgba(125,249,255,0.25)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

// Nebula blobs
function drawNebula() {
  const blobs = [
    { x: 580, y: 140, rx: 200, ry: 120, color: 'rgba(60,10,100,0.22)' },
    { x: 650, y: 380, rx: 160, ry: 100, color: 'rgba(0,30,100,0.2)' },
    { x: 250, y: 80,  rx: 180, ry: 80,  color: 'rgba(0,60,80,0.15)' },
  ];
  blobs.forEach(b => {
    const grd = ctx.createRadialGradient(b.x, b.y, 10, b.x, b.y, Math.max(b.rx, b.ry));
    grd.addColorStop(0, b.color);
    grd.addColorStop(1, 'transparent');
    ctx.save();
    ctx.scale(1, b.ry / b.rx);
    ctx.beginPath();
    ctx.arc(b.x, b.y * (b.rx / b.ry), b.rx, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.restore();
  });
}

// Enemy ship (simple)
function drawEnemy(ex, ey, a) {
  ctx.save();
  ctx.translate(ex, ey);
  ctx.rotate(a + Math.PI);
  ctx.beginPath();
  ctx.moveTo(28, 0);
  ctx.lineTo(-8, -14);
  ctx.lineTo(-20, 0);
  ctx.lineTo(-8, 14);
  ctx.closePath();
  ctx.fillStyle = '#3a0a0a';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,80,80,0.5)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Red glow
  const g = ctx.createRadialGradient(30, 0, 1, 30, 0, 20);
  g.addColorStop(0, 'rgba(255,60,60,0.5)');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(30, 0, 20, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

let t = 0;
function draw() {
  t += 0.016;

  // Background
  ctx.fillStyle = '#00000f';
  ctx.fillRect(0, 0, W, H);

  drawNebula();

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    const tw = 0.5 + 0.5 * Math.sin(t * 1.5 + s.twinkle);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,230,255,${s.alpha * tw})`;
    ctx.fill();
  });

  // Asteroids
  asteroids.forEach(ast => {
    ast.rot += ast.rotSpeed;
    ast.x += ast.vx;
    if (ast.x < -ast.r * 2) ast.x = W + ast.r * 2;
    drawAsteroid(ast);
  });

  // Engine particles
  if (Math.random() < 0.7) spawnParticle();
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.035;
    const alpha = Math.max(0, p.life);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    const c1 = `rgba(80,180,255,${alpha * 0.8})`;
    const c2 = `rgba(200,240,255,${alpha * 0.3})`;
    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * alpha * 2);
    grd.addColorStop(0, c1);
    grd.addColorStop(1, c2);
    ctx.fillStyle = grd;
    ctx.fill();
    if (p.life <= 0) particles.splice(i, 1);
  });

  // Ship float
  ship.floatY = Math.sin(t * ship.floatSpeed * 60) * 8;
  drawShip(ship.x, ship.y + ship.floatY);

  // Enemy ships
  drawEnemy(560 + Math.sin(t * 0.7) * 18, 175 + Math.cos(t * 0.5) * 14, 0.15);
  drawEnemy(620 + Math.sin(t * 0.5 + 1) * 12, 260 + Math.cos(t * 0.6 + 2) * 10, -0.1);

  // Laser shot
  const laserX = ship.x + 40;
  const laserY = ship.y + ship.floatY - 2;
  const lg = ctx.createLinearGradient(laserX, laserY, laserX + 320, laserY);
  lg.addColorStop(0, 'rgba(125,249,255,0.9)');
  lg.addColorStop(0.6, 'rgba(125,249,255,0.4)');
  lg.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.moveTo(laserX, laserY);
  ctx.lineTo(laserX + 320, laserY);
  ctx.strokeStyle = lg;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = '#7df9ff';
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Second laser
  const lg2 = ctx.createLinearGradient(laserX, laserY + 6, laserX + 260, laserY + 6);
  lg2.addColorStop(0, 'rgba(125,249,255,0.5)');
  lg2.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.moveTo(laserX, laserY + 6);
  ctx.lineTo(laserX + 260, laserY + 6);
  ctx.strokeStyle = lg2;
  ctx.lineWidth = 1.2;
  ctx.stroke();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>

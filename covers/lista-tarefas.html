<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Tarefas Diárias</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px;
    height: 600px;
    overflow: hidden;
    background: #f0faf2;
    font-family: 'DM Sans', sans-serif;
  }

  canvas { position: absolute; top: 0; left: 0; }

  .ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .badge {
    position: absolute;
    top: 24px; right: 24px;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    padding: 5px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: #555;
    backdrop-filter: blur(8px);
  }

  /* App mockup */
  .app-card {
    position: absolute;
    top: 44px; left: 50%;
    transform: translateX(-50%);
    width: 320px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden;
    opacity: 0;
    animation: popIn 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateX(-50%) scale(0.9) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
  }

  .app-header {
    background: linear-gradient(135deg, #4ade80, #22c55e);
    padding: 18px 20px 14px;
  }

  .app-header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .app-title {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
  }

  .app-date {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    font-family: 'DM Mono', monospace;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .prog-bar {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 99px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 99px;
    animation: progGrow 1s 0.9s ease-out forwards;
  }

  @keyframes progGrow { to { width: 75%; } }

  .prog-label {
    font-size: 11px;
    color: rgba(255,255,255,0.9);
    font-weight: 500;
    white-space: nowrap;
  }

  /* Input row */
  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid #f1f5f9;
  }

  .fake-input {
    flex: 1;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12px;
    color: #94a3b8;
    font-family: 'DM Sans', sans-serif;
  }

  .add-btn {
    width: 30px; height: 30px;
    background: #22c55e;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    font-weight: 300;
    flex-shrink: 0;
  }

  /* Task list */
  .task-list { padding: 8px 0; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid #f8fafc;
    opacity: 0;
  }

  .task-item:nth-child(1) { animation: slideIn 0.4s 0.7s ease-out forwards; }
  .task-item:nth-child(2) { animation: slideIn 0.4s 0.85s ease-out forwards; }
  .task-item:nth-child(3) { animation: slideIn 0.4s 1.0s ease-out forwards; }
  .task-item:nth-child(4) { animation: slideIn 0.4s 1.15s ease-out forwards; }
  .task-item:nth-child(5) { animation: slideIn 0.4s 1.3s ease-out forwards; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid #e2e8f0;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }

  .check.done {
    background: #22c55e;
    border-color: #22c55e;
    color: #fff;
  }

  .task-text {
    flex: 1;
    font-size: 13px;
    color: #334155;
  }

  .task-text.done {
    text-decoration: line-through;
    color: #94a3b8;
  }

  .del-btn {
    font-size: 14px;
    color: #cbd5e1;
  }

  /* Bottom title */
  .title-block {
    position: absolute;
    bottom: 36px; left: 48px; right: 48px;
    opacity: 0;
    animation: fadeUp 0.6s 0.5s forwards;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3.5px;
    color: #16a34a;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .title {
    font-size: 28px;
    font-weight: 700;
    color: #14532d;
    line-height: 1.1;
  }

  .title span { color: #22c55e; }

  .tags {
    display: flex; gap: 8px; margin-top: 10px;
    opacity: 0;
    animation: fadeUp 0.6s 0.8s forwards;
  }

  .tag {
    border-radius: 100px;
    padding: 3px 13px;
    font-size: 10px;
    letter-spacing: 0.3px;
    font-weight: 500;
  }

  .tag.js   { background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.4); color: #16a34a; }
  .tag.html { background: rgba(251,191,36,0.12);  border: 1px solid rgba(251,191,36,0.4); color: #b45309; }
  .tag.css  { background: rgba(248,113,113,0.1);  border: 1px solid rgba(248,113,113,0.4); color: #dc2626; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .vignette {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(200,240,210,0.5) 100%);
  }
</style>
</head>
<body>

<canvas id="bg" width="800" height="600"></canvas>

<div class="ui">
  <div class="badge">JAVASCRIPT</div>

  <div class="app-card">
    <div class="app-header">
      <div class="app-header-top">
        <div class="app-title">Minhas Tarefas</div>
        <div class="app-date">Sex, 17 Abr</div>
      </div>
      <div class="progress-row">
        <div class="prog-bar"><div class="prog-fill"></div></div>
        <div class="prog-label">3 / 4 feitas</div>
      </div>
    </div>

    <div class="input-row">
      <div class="fake-input">Adicionar nova tarefa...</div>
      <div class="add-btn">+</div>
    </div>

    <div class="task-list">
      <div class="task-item">
        <div class="check done">✓</div>
        <div class="task-text done">Revisar pull requests</div>
        <div class="del-btn">✕</div>
      </div>
      <div class="task-item">
        <div class="check done">✓</div>
        <div class="task-text done">Estudar JavaScript</div>
        <div class="del-btn">✕</div>
      </div>
      <div class="task-item">
        <div class="check done">✓</div>
        <div class="task-text done">Atualizar portfólio</div>
        <div class="del-btn">✕</div>
      </div>
      <div class="task-item">
        <div class="check"></div>
        <div class="task-text">Fazer deploy no GitHub Pages</div>
        <div class="del-btn">✕</div>
      </div>
      <div class="task-item">
        <div class="check"></div>
        <div class="task-text" style="color:#cbd5e1;font-style:italic;font-size:12px">Nova tarefa sendo digitada<span style="display:inline-block;width:6px;height:12px;background:#22c55e;margin-left:2px;vertical-align:middle;animation:blink 1s step-end infinite"></span></div>
      </div>
    </div>
  </div>

  <div class="title-block">
    <div class="eyebrow">Gerenciador Web</div>
    <div class="title">Lista de<br><span>Tarefas Diárias</span></div>
    <div class="tags">
      <span class="tag js">JavaScript</span>
      <span class="tag html">HTML</span>
      <span class="tag css">CSS</span>
    </div>
  </div>

  <div class="vignette"></div>
</div>

<style>
@keyframes blink { 50% { opacity: 0; } }
</style>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// Soft leaf/blob shapes in background
const blobs = [
  { x: 680, y: 80,  r: 160, c: 'rgba(74,222,128,0.12)' },
  { x: 100, y: 500, r: 130, c: 'rgba(134,239,172,0.1)' },
  { x: 760, y: 480, r: 100, c: 'rgba(187,247,208,0.15)' },
  { x: 60,  y: 120, r: 80,  c: 'rgba(74,222,128,0.07)' },
];

// Floating checkmarks
const checks = Array.from({length: 14}, (_, i) => ({
  x: Math.random() * W,
  y: Math.random() * H,
  size: 8 + Math.random() * 14,
  alpha: 0.04 + Math.random() * 0.1,
  speed: 0.2 + Math.random() * 0.3,
  phase: Math.random() * Math.PI * 2
}));

// Small dots
const dots = Array.from({length: 80}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: 1.5 + Math.random() * 2.5,
  alpha: 0.06 + Math.random() * 0.12,
  phase: Math.random() * Math.PI * 2,
  speed: 0.3 + Math.random() * 0.5
}));

let t = 0;
function draw() {
  t += 0.016;

  // Background
  const bgGrd = ctx.createLinearGradient(0, 0, W, H);
  bgGrd.addColorStop(0, '#edfdf3');
  bgGrd.addColorStop(1, '#f0fdf4');
  ctx.fillStyle = bgGrd;
  ctx.fillRect(0, 0, W, H);

  // Blobs
  blobs.forEach(b => {
    const grd = ctx.createRadialGradient(b.x, b.y, 10, b.x, b.y, b.r);
    grd.addColorStop(0, b.c);
    grd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  });

  // Dots
  dots.forEach(d => {
    const a = d.alpha * (0.7 + 0.3 * Math.sin(t * d.speed + d.phase));
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(34,197,94,${a})`;
    ctx.fill();
  });

  // Floating checkmarks
  checks.forEach(c => {
    const y = c.y + Math.sin(t * c.speed + c.phase) * 6;
    ctx.save();
    ctx.translate(c.x, y);
    ctx.globalAlpha = c.alpha;
    ctx.strokeStyle = '#16a34a';
    ctx.lineWidth = c.size * 0.18;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(-c.size * 0.35, 0);
    ctx.lineTo(-c.size * 0.05, c.size * 0.35);
    ctx.lineTo(c.size * 0.4, -c.size * 0.3);
    ctx.stroke();
    ctx.restore();
  });

  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
